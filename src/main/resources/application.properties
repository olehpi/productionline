spring.application.name=ProductionLine
simulation.kafka.enabled=false
simulation.distributed.worker.enabled=false
simulation.distributed.worker.inbound-topic=line-op-0-to-1
simulation.distributed.worker.group-id=productionline-worker
simulation.distributed.worker.operation-id=1
simulation.distributed.worker.next-operation-id=2
simulation.distributed.worker.tau-mean=10.0
simulation.distributed.worker.tau-sigma=0.0
simulation.distributed.worker.random-seed=0
simulation.distributed.finish-store.enabled=false
simulation.distributed.finish-store.topic=line-op-7-to-8
simulation.distributed.finish-store.group-id=productionline-finish-store
simulation.orchestration.from-api.enabled=true
simulation.orchestration.compose.project-dir=.
simulation.orchestration.compose.base-file=docker-compose.yml
simulation.orchestration.compose.override-file=docker-compose.operations.yml
simulation.orchestration.workers.ready-timeout-ms=120000
simulation.orchestration.workers.ready-poll-interval-ms=3000
